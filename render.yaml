# Render Blueprint. In the Render dashboard: New > Blueprint, point it at this
# repo, then set the two secret env vars below in the service's Environment tab.
services:
  - type: web
    name: spoty-to-mp3
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false   # set in dashboard (kept out of source control)
      - key: SPOTIFY_CLIENT_SECRET
        sync: false   # set in dashboard
